apiVersion: apps/v1
kind: Deployment

metadata:
  name: churn-api

spec:
  replicas: 2

  selector:
    matchLabels:
      app: churn-api

  template:

    metadata:
      labels:
        app: churn-api

    spec:

      containers:

      - name: churn-api

        image: ghcr.io/arpanneupane75/churn-prediction-mlops:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 8000


        readinessProbe:

          httpGet:
            path: /health
            port: 8000

          initialDelaySeconds: 5
          periodSeconds: 10


        livenessProbe:

          httpGet:
            path: /health
            port: 8000

          initialDelaySeconds: 10
          periodSeconds: 20